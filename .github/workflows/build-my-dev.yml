name: Build Android (my-dev)

on:
  workflow_dispatch:

jobs:
  android:
    name: Android arm64
    runs-on: ubuntu-latest
    permissions: write-all

    steps:
      - name: 📦 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ☕ 配置 Java 环境
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: 🐦 安装 Flutter (Master)
        uses: subosito/flutter-action@v2
        with:
          channel: master
          cache: true

      - name: 📝 Inject fallback
        shell: bash
        run: |
          mkdir -p lib/secrets
          cat > lib/secrets/fallback.dart <<'EOF'
          const String siliconflowFallbackKey = '${{ secrets.SILICONFLOW_KEY }}';
          EOF

      - name: 📝 获取版本号
        id: version
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | sed 's/version: //' | tr -d ' ')
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "版本号: $VERSION"

      - name: 🔑 写入签名密钥
        if: ${{ env.SIGN_KEYSTORE_BASE64 != '' }}
        env:
          SIGN_KEYSTORE_BASE64: ${{ secrets.SIGN_KEYSTORE_BASE64 }}
        run: |
          echo "$SIGN_KEYSTORE_BASE64" | base64 --decode > android/app/key.jks
          echo "storeFile=key.jks" >> android/key.properties
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "✅ 签名配置已写入"

      - name: 🏗️ 构建 APK (arm64 only)
        run: flutter build apk --release --split-per-abi --target-platform android-arm64

      - name: 📦 重命名 APK
        run: |
          cd build/app/outputs/flutter-apk
          for file in app-*-release.apk; do
            abi=$(echo "$file" | sed -E 's/app-(.*)-release\.apk/\1/')
            mv "$file" "Kelivo_android_${VERSION}_${abi}.apk"
          done

      - name: 📤 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: Kelivo-arm64
          path: build/app/outputs/flutter-apk/Kelivo_android_*_arm64-v8a.apk
